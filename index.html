<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cindy Pet Shop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="logo">🐾 Cindy Pet Shop</div>
    <nav>
      <a href="#productos">Productos</a>
      <a href="#ofertas">Ofertas</a>
      <a href="#contacto">Contacto</a>
      <button id="btnCarrito">🛒 <span id="contadorCarrito">0</span></button>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h1>Todo para tu mascota</h1>
      <p>Alimentos, accesorios, juguetes y entregas a domicilio.</p>
      <p><strong>José C. Paz, San Miguel, Grand Bourg y alrededores.</strong></p>
      <a class="btn" href="#productos">Ver productos</a>
    </div>
  </section>

  <main>
    <section class="busqueda">
      <input type="text" id="buscador" placeholder="Buscar alimento, marca o producto..." />
      <select id="filtroCategoria">
        <option value="todos">Todas las categorías</option>
        <option value="perros">Perros</option>
        <option value="gatos">Gatos</option>
        <option value="accesorios">Accesorios</option>
      </select>
    </section>

    <section id="productos">
      <h2>Productos destacados</h2>
      <div id="listaProductos" class="grid"></div>
    </section>
  </main>

  <aside id="carrito" class="carrito oculto">
    <h2>Carrito</h2>
    <div id="itemsCarrito"></div>
    <h3>Total: $<span id="totalCarrito">0</span></h3>
    <button id="finalizarPedido">Finalizar por WhatsApp</button>
    <button id="cerrarCarrito" class="secundario">Cerrar</button>
  </aside>

  <a class="whatsapp" href="https://wa.me/5491150582263" target="_blank">💬</a>

  <footer id="contacto">
    <p>Cindy Pet Shop · Pedidos por WhatsApp · Pagás al recibir</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
